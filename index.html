<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PREPARATÓRIO PPMA2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #F0D080;
      --dark: #0A0C10;
      --dark-2: #111318;
      --dark-3: #1A1D24;
      --text: #E8E6E0;
      --muted: #7A7870;
      --accent: #2A6FDB;
      --accent2: #1a4fa0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--dark);
      font-family: 'Barlow', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background texture + radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(42,111,219,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle diagonal grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.012) 40px,
        rgba(255,255,255,0.012) 41px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 48px 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Shield / badge */
    .badge {
      width: 90px;
      height: 90px;
      background: linear-gradient(145deg, var(--dark-3), var(--dark-2));
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 0 6px rgba(201,168,76,0.08), 0 8px 32px rgba(0,0,0,0.5);
      animation: pulse-ring 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 6px rgba(201,168,76,0.08), 0 8px 32px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 0 12px rgba(201,168,76,0.04), 0 8px 32px rgba(0,0,0,0.5); }
    }

    .badge svg {
      width: 46px;
      height: 46px;
    }

    /* Header block */
    .header {
      text-align: center;
      margin-bottom: 44px;
      animation: fade-up 0.7s ease both;
    }

    .header-sub {
      font-family: 'Barlow', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 9vw, 52px);
      line-height: 1.0;
      color: var(--text);
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .header-title span {
      color: var(--gold);
      display: block;
    }

    .divider {
      width: 56px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 14px;
    }

    .header-tagline {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    /* Link cards */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      background: var(--dark-3);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      animation: fade-up 0.7s ease both;
    }

    .link-card:nth-child(1) { animation-delay: 0.15s; }
    .link-card:nth-child(2) { animation-delay: 0.30s; }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(201,168,76,0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:hover {
      transform: translateY(-3px) scale(1.015);
      border-color: var(--gold);
      box-shadow: 0 8px 32px rgba(201,168,76,0.15), 0 2px 8px rgba(0,0,0,0.4);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:active { transform: translateY(0) scale(0.99); }

    /* Shine sweep on hover */
    .link-card::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.04), transparent);
      transition: left 0.5s ease;
    }

    .link-card:hover::after { left: 150%; }

    .card-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(42,111,219,0.3);
    }

    .link-card:nth-child(2) .card-icon {
      background: linear-gradient(135deg, #1a5c3a, #27a060);
      box-shadow: 0 4px 12px rgba(39,160,96,0.3);
    }

    .card-icon svg {
      width: 24px;
      height: 24px;
      color: #fff;
    }

    .card-text {
      flex: 1;
    }

    .card-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .card-arrow {
      flex-shrink: 0;
      color: var(--gold);
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fade-up 0.7s 0.5s ease both;
    }

    .footer-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
      margin-bottom: 20px;
    }

    .footer-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-text strong {
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Badge -->
    <div class="badge" style="animation-delay:0s; animation: fade-up 0.5s ease both, pulse-ring 3s 0.5s ease-in-out infinite;">
      <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M23 4L6 11V22C6 31.4 13.5 40.2 23 43C32.5 40.2 40 31.4 40 22V11L23 4Z"
          fill="none" stroke="#C9A84C" stroke-width="2" stroke-linejoin="round"/>
        <path d="M23 4L6 11V22C6 31.4 13.5 40.2 23 43C32.5 40.2 40 31.4 40 22V11L23 4Z"
          fill="rgba(201,168,76,0.06)"/>
        <path d="M16 23l5 5 9-9" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Header -->
    <div class="header">
      <p class="header-sub">Preparatório</p>
      <h1 class="header-title">
        PPMA<span>2026</span>
      </h1>
      <div class="divider"></div>
      <p class="header-tagline">Seu caminho para a aprovação</p>
    </div>

    <!-- Links -->
    <div class="links">

      <!-- Apostilhas + Simulado -->
      <a class="link-card" href="https://syncpay.link/2WfhJy" ">
        <div class="card-icon">
          <!-- Book icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            <line x1="12" y1="6" x2="16" y2="6"/>
            <line x1="12" y1="10" x2="16" y2="10"/>
          </svg>
        </div>
        <div class="card-text">
          <div class="card-label">Apostilhas + Simulado</div>
          <div class="card-desc">Material completo de estudo e avaliação</div>
        </div>
        <svg class="card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>

      <!-- Simulado -->
      <a class="link-card" href="https://syncpay.link/2WfhJy" ">
        <div class="card-icon">
          <!-- Clipboard/test icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
        </div>
        <div class="card-text">
          <div class="card-label">Simulado</div>
          <div class="card-desc">Teste seus conhecimentos agora</div>
        </div>
        <svg class="card-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-line"></div>
      <p class="footer-text"><strong>PPMA 2026</strong> &nbsp;·&nbsp; Rumo à aprovação</p>
    </div>

  </div>
</body>
</html>
